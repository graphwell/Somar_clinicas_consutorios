<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synka — Offline</title>
    <style>
        body { background: #050510; color: #fff; font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .icon { font-size: 4rem; margin-bottom: 2rem; }
        h1 { font-weight: 900; letter-spacing: -0.05em; margin: 0; font-style: italic; text-transform: uppercase; }
        p { color: rgba(255,255,255,0.4); font-size: 0.8rem; text-transform: uppercase; font-weight: 800; letter-spacing: 0.1em; margin-top: 1rem; }
        .accent { color: #4a4ae2; }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>Você está <span class="accent">Offline</span></h1>
    <p>Verifique sua conexão para acessar a agenda em tempo real.</p>
</body>
</html>
